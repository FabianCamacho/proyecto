spring.application.name=tienda
#Para definir el puerto por donde escucha el servidor web
server.port = 80

# Se establece el formato de fecha/hora del log de la aplicacion
logging.pattern.dateformat=hh:mm

# Se elimina el banner de Spring en el log
spring.main.banner-mode=off

#En desarrollo el "cache" no se usa en produccion si
spring.thymeleaf.cache=false

#Conexión local a la BD Techshop en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/super_Sting
#spring.datasource.url=jdbc:mysql://mysql-b81f90e-techshopfcf.l.aivencloud.com:28029/techshop
 
#Usuario y clave de creaTablas.sql
spring.datasource.username=usuario1
spring.datasource.password=contrasena
 
#Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
 
#mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

