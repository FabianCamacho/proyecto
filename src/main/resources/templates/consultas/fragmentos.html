<!-- fragmento 1 para mostrar las categorias en tabs -->
<section th:fragment="tabs" class="py-3 mb-4">
    <div class="d-flex justify-content-center px-5">
        <ul class="nav nav-underline">
            <li class="nav-item">
                <a class="nav-link" aria-current="page" th:href="@{/}">[[#{pruebas.todas}]]</a>
            </li>
            <li th:each="c : ${categorias}"
                class="nav-item">
                <a class="nav-link" 
                   th:href="@{/consultas/{id}(id=${c.idCategoria})}">[[${c.descripcion}]]</a>
            </li>           
        </ul>
    </div>


</section>

<!-- fragmento 2 para el listado de productos en tarjetas -->
<section th:fragment="tarjetas" class="container py-4">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <div th:each="p: ${productos}" class="col">
            <div class="card h-100 shadow">
                <div class="d-flex justify-content-center align-items-center bg-light p-3" style="height: 200px;">
                    <img th:src="${p.rutaImagen}" th:alt="${p.descripcion}"
                         class="img-fluid" style="max-height: 100%;object-fit: contain;"/>
                </div>
                <div class="card-header bg-white">
                    <h5 class="card-title text-cente text-truncate mb-0"> 
                        [[${p.descripcion}]]
                    </h5>
                </div>
                <div class="card-body d-flex flex-column">
                    <p class="card-text text-muted mb-auto text-truncate">[[${p.detalle}]]</p>               
                </div>
                <div class="card-footer d-flex bg-white justify-content-between align-items-center">
                    <div class="fw-bold">
                        <span class="text-success h5">[[${#numbers.formatCurrency(p.precio)}]]</span>
                        <span th:if="${p.existencias > 0}" class="badge text-bg-success ms-2">[[${p.existencias}]] unidades</span>
                        <span th:unless="${p.existencias > 0}" class="badge text-bg-danger ms-2">Agotado!</span>
                    </div>
                    <form th:action="@{/carrito/agregar}"
                          th:method="POST" class="inline">
                        <input type="hidden" th:value="${p.idProducto}"
                               th:name="idProducto"/>
                        <button type="button" class="btn bbtn-sm btn-primary"
                                th:disabled="${p.existencias == 0}"
                                onclick="addCart(this.form)">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- fragmento 3 para mostrar las consultas  -->
<section th:fragment="consultas" class="row row-cols-4 p-2">
    <div th:replace="~{consultas/fragmentos::frmConsulta('primary',#{consultas.derivadas},',consultas/consultaDerivada')}"/>
    <div th:replace="~{consultas/fragmentos::frmConsulta('warning',#{consultas.jpql},',consultas/consultaJPQL')}"/>
    <div th:replace="~{consultas/fragmentos::frmConsulta('success',#{consultas.sql},',consultas/consultaSQL')}"/>
    <div class='card'><p>aca va su tarea </p></div>

</section>

<!-- fragmento 3 para mostrar el formulario de consultas con parametros  -->
<section th:fragment="frmConsulta(frmColor,frmText,frmURL)">

    <form method="post" class='was validated' th:action='@{${frmURL}}'>
        <div class="card p-2"> 
            <div class="card-header text-center text-white" th:classappend="${'bg-'+frmColor}">
                <h5>[[${frmText}]]</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label>[[#{consultas.precio.inferior}]] </label>
                    <input type='number' name='precioInf' th:value='${precioInf}' class='form-control' min='0' required/>
                </div>
                <div class="mb-3">
                    <label>[[#{consultas.precio.superior}]] </label>
                    <input type='number' name='precioSup' th:value='${precioSup}' class='form-control' min='0' required/>
                </div>
            </div>
            <div class='card-footer text-center'>
                <button type='submit' class='text-white' th:classappend="${'btn-'+frmColor}">
                    <i class="fa-solid fa-magnifying-glass"></i> [[${frmText}]]
                </button>               
            </div>
        </div>
    </form>
</section>
